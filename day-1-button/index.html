<!DOCTYPE html>
<html>
  <head>
    <title>Day 1 - Button</title>
  </head>

  <body>
    <h1 id="title">Hello 👋</h1>

    <button onclick="changeText()">
      Click me
    </button>

    <script>
      function changeText() {
        document.getElementById("title").innerText = "I wrote my first JavaScript 🚀";
      }
    </script>
  </body>
</html>
